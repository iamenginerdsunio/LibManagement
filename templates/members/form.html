{% extends "base.html" %}
{% block title %}{{ action }} Member – LibManagement{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="{{ url_for('members') }}" class="text-decoration-none text-muted">
    <i class="bi bi-arrow-left me-1"></i>Back to Members
  </a>
</div>

<div class="card" style="max-width: 500px;">
  <div class="card-header"><h4 class="mb-0">{{ action }} Member</h4></div>
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" required
               value="{{ member.name if member else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
        <input type="email" name="email" class="form-control" required
               value="{{ member.email if member else '' }}">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Phone</label>
        <input type="tel" name="phone" class="form-control"
               value="{{ member.phone if member else '' }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">
          <i class="bi bi-check-lg me-1"></i>{{ action }} Member
        </button>
        {% if member %}
        <a href="{{ url_for('member_detail', member_id=member.id) }}" class="btn btn-outline-secondary">Cancel</a>
        {% else %}
        <a href="{{ url_for('members') }}" class="btn btn-outline-secondary">Cancel</a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
