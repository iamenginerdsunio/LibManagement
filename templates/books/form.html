{% extends "base.html" %}
{% block title %}{{ action }} Book – LibManagement{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="{{ url_for('books') }}" class="text-decoration-none text-muted">
    <i class="bi bi-arrow-left me-1"></i>Back to Books
  </a>
</div>

<div class="card" style="max-width: 600px;">
  <div class="card-header"><h4 class="mb-0">{{ action }} Book</h4></div>
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" required
               value="{{ book.title if book else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Author <span class="text-danger">*</span></label>
        <input type="text" name="author" class="form-control" required
               value="{{ book.author if book else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">ISBN <span class="text-danger">*</span></label>
        <input type="text" name="isbn" class="form-control" required
               value="{{ book.isbn if book else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Genre</label>
        <input type="text" name="genre" class="form-control"
               value="{{ book.genre if book else '' }}">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Quantity</label>
        <input type="number" name="quantity" class="form-control" min="1" required
               value="{{ book.quantity if book else 1 }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }} Book
        </button>
        {% if book %}
        <a href="{{ url_for('book_detail', book_id=book.id) }}" class="btn btn-outline-secondary">Cancel</a>
        {% else %}
        <a href="{{ url_for('books') }}" class="btn btn-outline-secondary">Cancel</a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
